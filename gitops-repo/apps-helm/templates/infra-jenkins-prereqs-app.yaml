apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-jenkins-prereqs
  namespace: argocd
spec:
  project: default
  source:
    repoURL: '{{ .Values.global.gitlabUrl }}/root/gitops-repo.git'
    path: kubernetes/cicd/jenkins
    targetRevision: main
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: jenkins
  syncPolicy:
    automated: { prune: true, selfHeal: true }
