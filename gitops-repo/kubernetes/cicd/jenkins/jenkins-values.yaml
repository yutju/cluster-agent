controller:
  # 1. 필수 플러그인 자동 설치
  installPlugins:
    - kubernetes:latest
    - workflow-aggregator:latest
    - gitlab-plugin:latest
    - docker-workflow:latest
    - blueocean:latest
    - configuration-as-code:latest
    - credentials-binding:latest
    - json-path-api:latest
    - job-dsl:latest
    - aws-credentials:latest

  # 2. 외부 접속 설정
  serviceType: NodePort
  nodePort: 32000

  # 3. 스타트업 프로브 확장
  startupProbe:
    failureThreshold: 30
    periodSeconds: 10

  # 4. 리소스 할당량
  resources:
    requests:
      cpu: "500m"
      memory: "1024Mi"
    limits:
      cpu: "1000m"
      memory: "2048Mi"

  # 5. 관리자 계정 설정
  admin:
    existingSecret: "jenkins-admin-secret"
    userKey: "jenkins-admin-user"
    passwordKey: "jenkins-admin-password"

  # 6. JCasC 자동 설정
  JCasC:
    defaultConfig: true
    configScripts:
      global-settings: |
        jenkins:
          globalNodeProperties:
            - envVars:
                env:
                  - key: GITLAB_URL
                    value: "${GITLAB_URL}"
                  - key: JENKINS_IP
                    value: "${JENKINS_IP}"
                  - key: JENKINS_PORT
                    value: "${JENKINS_PORT}"
      gitlab-setting: |
        unclassified:
          gitLabConnectionConfig:
            connections:
              - name: "my-gitlab"
                url: "${GITLAB_URL}"
                apiTokenId: "gitlab-token-id"
                clientBuilderId: "autodetect"
                ignoreCertificateErrors: true
      gitlab-credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - string:
                      scope: GLOBAL
                      id: "gitlab-token-id"
                      secret: "${GITLAB_TOKEN}"
                      description: "GitLab Personal Access Token for API"
                  - usernamePassword:
                      scope: GLOBAL
                      id: "gitlab-checkout-cred"
                      username: "${GITLAB_USER}"
                      password: "${GITLAB_TOKEN}"
                      description: "GitLab Checkout Credential"
      aws-credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: "aws-ecr-cred"
                      username: "${AWS_ACCESS_KEY_ID}"
                      password: "${AWS_SECRET_ACCESS_KEY}"
                      description: "AWS ECR Credentials for Jenkins"
      project-setup: |
        jobs:
          - script: >
              pipelineJob('jenkins-test-pipeline') {
                definition {
                  cpsScm {
                    scm {
                      git {
                        remote {
                          url("${GITLAB_URL}/root/app-repo.git")
                          credentials('gitlab-checkout-cred')
                        }
                        branches('*/main')
                      }
                    }
                    scriptPath('Jenkinsfile')
                  }
                }
              }

  # 7. 환경 변수 주입
  containerEnv:
    - name: GITLAB_TOKEN
      valueFrom:
        secretKeyRef:
          name: gitlab-api-secret
          key: api-token
    - name: GITLAB_URL
      valueFrom:
        configMapKeyRef:
          name: jenkins-infra-config
          key: GITLAB_URL
    - name: GITLAB_USER
      valueFrom:
        configMapKeyRef:
          name: jenkins-infra-config
          key: GITLAB_USER
    - name: JENKINS_IP
      valueFrom:
        configMapKeyRef:
          name: jenkins-infra-config
          key: JENKINS_IP
    - name: JENKINS_PORT
      valueFrom:
        configMapKeyRef:
          name: jenkins-infra-config
          key: JENKINS_PORT
    - name: AWS_ACCESS_KEY_ID
      valueFrom:
        secretKeyRef:
          name: aws-ecr-secret
          key: access-key
    - name: AWS_SECRET_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: aws-ecr-secret
          key: secret-key

# 8. 데이터 보존 설정
persistence:
  enabled: true
  existingClaim: jenkins-pvc
  storageClass: "local-path"
