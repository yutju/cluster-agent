apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-cluster-admin-binding
  labels:
    app.kubernetes.io/managed-by: jenkins
subjects:
- kind: ServiceAccount
  name: jenkins-stack
  namespace: jenkins
roleRef:
  kind: ClusterRole
  #  클러스터 전체에 대한 관리 권한을 부여
  name: cluster-admin
  apiGroup: rbac.authorization.k8s.io
