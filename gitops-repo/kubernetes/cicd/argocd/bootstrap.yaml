apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://192.168.72.131/root/gitops-repo.git'
    targetRevision: main
    path: . # 🌟 기존 'kubernetes' 대신 '.' (루트 경로)으로 변경하여 경로 미인식 원천 차단!
    directory:
      recurse: true
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
