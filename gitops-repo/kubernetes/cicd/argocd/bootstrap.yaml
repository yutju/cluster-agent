apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-bootstrap-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argoproj.io
spec:
  project: default
  source:
    repoURL: 'http://192.168.72.131/root/gitops-repo.git'
    targetRevision: main
    path: apps-helm
    # 수정된 부분: 디렉토리 옵션 대신 helm 옵션을 명시하여 values.yaml을 읽도록 지시
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
